version: '3.9'
services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
  server:
    build: ./server
    command: npm run dev
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - mongodb
volumes:
  mongodb_data:
